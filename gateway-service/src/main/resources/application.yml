spring:
  application:
    name: gateway-service

  datasource:
    url: jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  h2:
    console:
      enabled: false

server:
  port: 8080

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}

  otlp:
    tracing:
      export:
        enabled: false

  endpoints:
    web:
      base-path: /
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
          - circuitbreakers
          - circuitbreakerevents

  endpoint:
    health:
      show-components: when-authorized
      show-details: when-authorized

  health:
    db:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

account-service:
  base-url: http://localhost:8081
  connect-timeout: 2s
  read-timeout: 3s

logging:
  structured:
    format:
      console: ecs

    ecs:
      service:
        name: ${spring.application.name}
        version: 1.0.0
        environment: local

    json:
      stacktrace:
        root: first
        max-length: 4096
        max-throwable-depth: 20
        include-common-frames: false

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-type: count_based
        sliding-window-size: 5
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 2
        wait-duration-in-open-state: 10s
        automatic-transition-from-open-to-half-open-enabled: true

    instances:
      accountService:
        base-config: default