spring:
  datasource:
    url: jdbc:h2:mem:gatewaydb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  h2:
    console:
      enabled: false

account-service:
  base-url: http://localhost:8081

logging:
  level:
    org.hibernate.SQL: WARN

management:
  endpoint:
    health:
      show-components: always
      show-details: always