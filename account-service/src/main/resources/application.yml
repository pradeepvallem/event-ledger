spring:
  application:
    name: account-service

  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

management:
  tracing:
    sampling:
      probability: 1.0

  otlp:
    tracing:
      export:
        enabled: false

  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

logging:
  structured:
    format:
      console: ecs

    ecs:
      service:
        name: ${spring.application.name}
        version: 1.0.0
        environment: local

    json:
      stacktrace:
        root: first
        max-length: 4096
        max-throwable-depth: 20
        include-common-frames: false